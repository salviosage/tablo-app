services:
  backend:
    build: ./backend
    container_name: tablo-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/tmp/tablo_uploads
    environment:
      - DEBUG=true

  frontend:
    build: ./frontend
    container_name: tablo-web
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  upload_data: